<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>⛰️ My Outdoor Archive</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
<link rel="stylesheet" href="style.css">

<style>
#map {
height: 100vh;
}
</style>

</head>


<body>

<div id="gpxModal" class="modal">
  <div class="modal-content">
    <h2>Import GPX Track</h2>
    <input type="file" id="gpxFile" accept=".gpx"><br><br>
    <label>Name</label>
    <input type="text" id="gpxName" placeholder="Name of the hike">
    <label>Difficulty</label>
    <select id="gpxDifficulty">
      <option value="">Unknown</option>
      <option value="1">1 - Easy</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5 - Hard</option>
    </select>
    <label>Exposure</label>
    <select id="gpxGaz">
      <option value="">Unknown</option>
      <option value="true">Yes</option>
      <option value="false">No</option>
    </select>
    <label>Notes</label>
    <textarea id="gpxNotes" rows="6" placeholder="Notes about the hike..."></textarea>
    <div class="modal-buttons">
      <button id="submitGPX">Import</button>
      <button id="cancelGPX">Cancel</button>
    </div>
  </div>
</div>

<div id="sidebar">

  <button id="openGPXModal">Import GPX file</button>

  <div id="newTypeBox">
  <h3>Add other element</h3>
  <select id="newType">
    <option value="">--Choose an option--</option>
    <option value="point">Point of interest</option>
    <option value="area">Area</option>
  </select>
  <button id="startAdd">Add on the map</button>
  </div>

  <div id="filtersBox">
  <h3>Hike filters</h3>
  <p>
    <div class="distance-header">
      <label>Max distance :</label><br>
      <span id="distanceValue">50+ km</span>
    </div>
    <input type="range"
           id="distanceSlider"
           min="0"
           max="50"
           step="1"
           value="50">
  </p>
  <p>
  <label for="difficulty">Difficulty of hikes :</label>
  <select id="difficulty">
    <option value="">All</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
  </select>
  </p>
  <p>
  <label for="gaz">Exposure to the void :</label>
  <select id="gaz">
    <option value="">All</option>
    <option value="true">Yes</option>
    <option value="false">No</option>
  </select>
  </p>
  <button id="applyFilters">Apply</button>
  </div>

  <div id="layersBox">
  <h3>Layers</h3>
  <label class="toggle">
    <input type="checkbox" id="toggleGPX" checked>
    <span class="slider"></span>
    <span class="label-text">GPX tracks</span>
  </label>
  <label class="toggle">
    <input type="checkbox" id="togglePoints" checked>
    <span class="slider"></span>
    <span class="label-text">Points of interest</span>
  </label>
  <label class="toggle">
    <input type="checkbox" id="toggleAreas" checked>
    <span class="slider"></span>
    <span class="label-text">Areas</span>
  </label>

  </div>

</div>


<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="script.js"></script>

<script>
var geocoder = L.Control.geocoder({
  defaultMarkGeocode: false
})
.on('markgeocode', function (e) {
  var bbox = e.geocode.bbox;
  map.fitBounds(bbox);
})
.addTo(map);
</script>

</body>
</html>
